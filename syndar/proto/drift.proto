syntax = "proto3";

package syndar.api.v1;

import "syndar/proto/entity.proto";

option go_package = "github.com/EnotriumSyndicate/Syndar/syndar/proto";
option python_package = "syndar.proto";

// Per-node drift signal from Arthedain SNN
message NodeDriftSignal {
  string entity_id = 1;
  float e_fast = 2;               // Fast timescale trace (~100ms)
  float e_slow = 3;               // Slow timescale trace (~700ms)
  float combined_e = 4;           // E(t) = α·e_fast + β·e_slow
  float threshold = 5;            // Configured drift threshold
  bool exceeded = 6;              // E(t) > threshold
  int64 timestamp_ms = 7;
  Position position = 8;

  // Context for correlation analysis
  string field_id = 9;
  string task_id = 10;
}

// Spatial drift correlation analysis
message DriftCorrelation {
  string field_id = 1;
  int64 analysis_timestamp_ms = 2;

  // Participating nodes
  repeated string entity_ids = 3;
  int32 node_count = 4;

  // Correlation metrics
  float spatial_correlation_score = 5;  // 0.0-1.0, high = field-wide drift
  float temporal_correlation_score = 6; // 0.0-1.0, simultaneous drift

  // Drift characteristics
  float mean_drift_e = 7;
  float max_drift_e = 8;
  float std_drift_e = 9;

  // Interpretation
  DriftType drift_type = 10;
  float confidence = 11;
  string interpretation = 12;
}

enum DriftType {
  DRIFT_TYPE_UNSPECIFIED = 0;
  DRIFT_TYPE_INDEPENDENT = 1;      // Random per-node noise
  DRIFT_TYPE_SPATIAL = 2;          // Field-wide pattern (new contamination)
  DRIFT_TYPE_TEMPORAL = 3;         // Simultaneous across nodes (model drift)
  DRIFT_TYPE_COMPOUND = 4;         // Both spatial and temporal
}

// Drift alert for immediate action
message DriftAlert {
  string alert_id = 1;
  DriftSeverity severity = 2;
  DriftCorrelation correlation = 3;
  repeated NodeDriftSignal node_signals = 4;
  int64 created_at_ms = 5;

  // Recommended actions
  repeated string recommended_actions = 6;
  bool triggers_recalibration = 7;
  bool triggers_inspection = 8;
}

enum DriftSeverity {
  DRIFT_SEVERITY_UNSPECIFIED = 0;
  DRIFT_SEVERITY_INFO = 1;
  DRIFT_SEVERITY_WARNING = 2;
  DRIFT_SEVERITY_CRITICAL = 3;
  DRIFT_SEVERITY_EMERGENCY = 4;
}

// Drift report for periodic analysis
message DriftReport {
  string report_id = 1;
  int64 start_time_ms = 2;
  int64 end_time_ms = 3;
  string region = 4;

  // Summary statistics
  int32 total_nodes = 5;
  int32 nodes_with_drift = 6;
  float drift_rate = 7;           // Fraction of time nodes show drift

  // Significant events
  repeated DriftAlert alerts = 8;
  repeated DriftCorrelation correlations = 9;

  // Model recommendations
  bool recommends_model_recalibration = 10;
  string model_version = 11;
  float model_drift_confidence = 12;
}

// Drift query for historical analysis
message DriftQuery {
  string field_id = 1;
  string region = 2;
  int64 start_time_ms = 3;
  int64 end_time_ms = 4;
  float min_correlation_score = 5;
  repeated DriftType drift_types = 6;
}

// Model recalibration trigger
message RecalibrationRequest {
  string request_id = 1;
  string triggered_by = 2;
  string field_id = 3;
  DriftCorrelation correlation_evidence = 4;
  int64 triggered_at_ms = 5;
  string current_model_version = 6;
  string recommended_model_version = 7;
}

message RecalibrationResponse {
  string request_id = 1;
  bool approved = 2;
  string approved_by = 3;
  int64 approved_at_ms = 4;
  string new_model_version = 5;
  string deployment_plan = 6;
}
