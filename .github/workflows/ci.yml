name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Compile proto files
      run: |
        python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. proto/common.proto proto/entity.proto proto/drift.proto proto/soil.proto proto/task.proto proto/transport.proto || true
        if [ -d proto ]; then
          mv proto/*_pb2.py vegard/proto/ 2>/dev/null || true
          mv proto/*_pb2_grpc.py vegard/proto/ 2>/dev/null || true
        fi
    
    - name: Run linting with ruff
      run: ruff check vegard/ || true
    
    - name: Run type checking with mypy
      run: mypy vegard/ --ignore-missing-imports || true
    
    - name: Run tests with pytest
      run: pytest tests/ -v --cov=vegard --cov-report=xml --cov-report=term || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: docker build -t syndar:latest .
    
    - name: Test Docker image
      run: docker run --rm syndar:latest python -c "import syndar; print('Vegard imported successfully')"
