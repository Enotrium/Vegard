syntax = "proto3";

package vegard.api.v1;

import "vegard/proto/common.proto";

option go_package = "github.com/EnotriumSyndicate/Vegard/vegard/proto";

// Spectral configuration for scan task
message SpectralConfig {
  float resolution_m = 1;        // Ground sampling distance
  float altitude_m = 2;           // Flight altitude AGL
  int32 band_start_nm = 3;        // 400
  int32 band_end_nm = 4;          // 2500
  int32 band_count = 5;           // Number of spectral bands
  float exposure_ms = 6;          // Per-band exposure
}

// Scan task request from mission planner
message TaskRequest {
  string task_id = 1;

  // Target area
  GeoPolygon target_polygon = 2;
  string field_id = 3;

  // Task parameters
  float priority = 4;             // 0.0-1.0, higher = more urgent
  int64 deadline_ms = 5;          // Absolute deadline
  int64 estimated_duration_s = 6; // Estimated scan time

  // Scan configuration
  SpectralConfig spectral = 7;

  // Task metadata
  string mission_id = 8;
  string requested_by = 9;        // AIP user or system
  int64 created_at_ms = 10;

  // Preemption settings
  bool preemptible = 11;          // Can this task be preempted?
  float min_priority_to_preempt = 12;  // Priority threshold for preemption
}

// Task bid from a drone
message TaskBid {
  string task_id = 1;
  string entity_id = 2;
  float bid_cost = 3;             // Lower = better
  float estimated_arrival_s = 4;
  float battery_at_completion_pct = 5;
  Position current_position = 6;
  int64 timestamp_ms = 7;
}

// Task assignment notification
message TaskAck {
  string task_id = 1;
  string entity_id = 2;
  bool accepted = 3;
  string rejection_reason = 4;
  int64 accepted_at_ms = 5;
}

// Task progress update
message TaskProgress {
  string task_id = 1;
  string entity_id = 2;
  TaskStatus status = 3;
  float progress_pct = 4;         // 0.0-100.0
  Position current_position = 5;
  int64 updated_at_ms = 6;
  string status_message = 7;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_ASSIGNED = 2;
  TASK_STATUS_IN_TRANSIT = 3;
  TASK_STATUS_SCANNING = 4;
  TASK_STATUS_PROCESSING = 5;
  TASK_STATUS_COMPLETE = 6;
  TASK_STATUS_FAILED = 7;
  TASK_STATUS_PREEMPTED = 8;
  TASK_STATUS_CANCELLED = 9;
}

// Task completion with results
message TaskResult {
  string task_id = 1;
  string entity_id = 2;
  bool success = 3;
  string failure_reason = 4;
  bytes soil_data = 5;  // Serialized SoilPrediction
  bytes raw_spectral_cube_ref = 6;  // Reference to stored cube
  int64 completed_at_ms = 7;
  float battery_at_completion_pct = 8;
  Position final_position = 9;
  string flight_path_geojson = 10;  // Recorded flight path
}

// Task auction state for allocator
message TaskAuction {
  string task_id = 1;
  TaskRequest request = 2;
  repeated TaskBid bids = 3;
  string winner_entity_id = 4;
  int64 auction_closed_at_ms = 5;
}

// Mission aggregates multiple tasks
message Mission {
  string mission_id = 1;
  string name = 2;
  repeated string task_ids = 3;
  MissionStatus status = 4;
  float completion_pct = 5;
  int64 created_at_ms = 6;
  int64 completed_at_ms = 7;
}

enum MissionStatus {
  MISSION_STATUS_UNSPECIFIED = 0;
  MISSION_STATUS_PLANNED = 1;
  MISSION_STATUS_ACTIVE = 2;
  MISSION_STATUS_PAUSED = 3;
  MISSION_STATUS_COMPLETE = 4;
  MISSION_STATUS_ABORTED = 5;
}
