syntax = "proto3";

package syndar.api.v1;

import "syndar/proto/common.proto";

option go_package = "github.com/EnotriumSyndicate/Vegard/syndar/proto";

// Contaminant detection result
message Contaminant {
  string type = 1;               // "PE", "PP", "PA", "PS", "PET", "PFAS", "glyphosate", "lead", "cadmium", etc.
  float concentration = 2;       // wt% or ppm depending on type
  float confidence = 3;          // 0.0-1.0
  Position location = 4;         // GPS where detected
}

// Nutrient measurement
message Nutrient {
  string name = 1;               // "nitrogen", "phosphorus", "potassium", "carbon", "moisture", "ph"
  float value = 2;               // normalized or absolute value
  string unit = 3;               // "percent", "ppm", "mg/kg", "pH"
  float confidence = 4;
}

// Soil prediction payload from Hyperspectral-Restruct
message SoilPrediction {
  string field_id = 1;
  string scan_id = 2;            // Unique identifier for this scan

  // Core soil chemistry
  repeated Nutrient nutrients = 3;
  map<string, float> nutrient_map = 4;  // Convenience accessor

  // Contamination detection
  repeated Contaminant contaminants = 5;
  bool contamination_detected = 6;

  // Derived intelligence
  float land_value_score = 7;    // 0.0-1.0 composite score
  float remediation_priority = 8;  // 0.0-1.0 urgency
  float phytoremediation_suitability = 9;  // 0.0-1.0 hemp suitability

  // Provenance and verification
  bytes spectral_hash = 10;      // SHA256 of source spectral cube
  string drone_id = 11;            // Source drone entity_id
  int64 capture_timestamp_ms = 12;
  Position center_position = 13;   // Center of scan area

  // Model metadata
  string model_version = 14;       // Hyperspectral-Restruct version
  string model_commit = 15;        // Git commit hash
}

// Batch soil predictions for a field
message FieldSoilMap {
  string field_id = 1;
  repeated SoilPrediction predictions = 2;
  GeoPolygon boundary = 3;
  int64 generated_at_ms = 4;
}

// Soil map export formats
message SoilMapExport {
  string field_id = 1;
  oneof format {
    GeoJSONSoilMap geojson = 2;
    bytes geotiff = 3;
  }
}

message GeoJSONSoilMap {
  string type = 1;  // "FeatureCollection"
  repeated SoilFeature features = 2;
}

message SoilFeature {
  string type = 1;  // "Feature"
  GeoPolygon geometry = 2;
  SoilProperties properties = 3;
}

message SoilProperties {
  string scan_id = 1;
  map<string, float> nutrients = 2;
  repeated Contaminant contaminants = 3;
  float land_value_score = 4;
}
